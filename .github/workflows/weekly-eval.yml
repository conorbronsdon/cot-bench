name: Weekly Evaluation Run

on:
  schedule:
    # Every Monday at 6:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains to evaluate (space-separated)'
        required: false
        default: 'banking customer_success'
      models:
        description: 'Models to evaluate (comma-separated, blank for all)'
        required: false
        default: ''

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      # Fail fast with a one-line diagnosis when the run can't possibly work.
      # All three judges now run over hosted APIs (Kimi/GLM via OpenRouter,
      # Opus via Anthropic) and the simulators need OpenAI — so those three
      # keys are the hard requirements. Without this gate, a key-less run used
      # to burn the whole job and die at the final `git add` with a pathspec
      # error that said nothing.
      - name: Check required secrets
        run: |
          missing=""
          [ -z "$OPENAI_API_KEY" ] && missing="$missing OPENAI_API_KEY"
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$OPENROUTER_API_KEY" ] && missing="$missing OPENROUTER_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repo secrets:$missing — the weekly eval cannot run. Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Pre-flight check
        run: python -m scripts.preflight

      - name: Run evaluation
        run: |
          DOMAINS="${{ github.event.inputs.domains || 'banking customer_success' }}"
          MODELS="${{ github.event.inputs.models }}"

          # All three judges run on hosted APIs (no GPU). Pass --models via the
          # workflow_dispatch 'models' input for a cheaper subset smoke run.
          ARGS="--domains $DOMAINS"
          if [ -n "$MODELS" ]; then
            ARGS="$ARGS --models $MODELS"
          fi

          python -m scripts.run_eval $ARGS \
            --output data/results/results_$(date +%Y%m%d).parquet

      - name: Generate leaderboard
        run: python -m scripts.aggregate_results

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.run_number }}
          path: |
            data/results/*.parquet
            data/results/*.csv
            data/results/leaderboard.json

      - name: Commit updated results
        run: |
          # Upstream steps now fail loud on empty results; this assert is
          # belt-and-braces so a future regression diagnoses itself.
          test -f data/results/leaderboard.json || { echo "::error::leaderboard.json was not generated despite eval+aggregate exiting 0 — investigate scripts/aggregate_results.py"; exit 1; }
          git config user.name "COT Bench Bot"
          git config user.email "bot@cot-bench.dev"
          git add data/results/leaderboard.json data/results/latest.csv
          git diff --staged --quiet || git commit -m "Update leaderboard results $(date +%Y-%m-%d)"
          git push
