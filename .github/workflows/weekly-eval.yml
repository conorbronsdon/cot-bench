name: Weekly Evaluation Run

on:
  schedule:
    # Every Monday at 6:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      domains:
        description: 'Domains to evaluate (space-separated)'
        required: false
        default: 'banking customer_success'
      models:
        description: 'Models to evaluate (comma-separated, blank for all)'
        required: false
        default: ''
      publish:
        description: 'Commit results to the live leaderboard? (false = smoke/dry run)'
        required: false
        default: 'false'
      allow_partial:
        description: 'Publish even if some models failed? (bypasses the completeness gate)'
        required: false
        default: 'false'
      scenario_limit:
        description: 'Limit scenarios per domain (blank = all; set 1 for a smoke run)'
        required: false
        default: ''
      judges:
        description: 'Judges to use, space-separated keys (blank = all; e.g. "opus" for a smoke run)'
        required: false
        default: ''
      reliability_runs:
        description: 'Repeated runs per scenario (blank = default 3; set 1 for a smoke run)'
        required: false
        default: ''

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      # Fail fast with a one-line diagnosis when the run can't possibly work.
      # All three judges now run over hosted APIs (Kimi/GLM via OpenRouter,
      # Opus via Anthropic) and the simulators need OpenAI — so those three
      # keys are the hard requirements. Without this gate, a key-less run used
      # to burn the whole job and die at the final `git add` with a pathspec
      # error that said nothing.
      - name: Check required secrets
        run: |
          missing=""
          [ -z "$OPENAI_API_KEY" ] && missing="$missing OPENAI_API_KEY"
          [ -z "$ANTHROPIC_API_KEY" ] && missing="$missing ANTHROPIC_API_KEY"
          [ -z "$OPENROUTER_API_KEY" ] && missing="$missing OPENROUTER_API_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required repo secrets:$missing — the weekly eval cannot run. Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi
          # GOOGLE_API_KEY is not hard-required (a Gemini-free subset run is
          # valid), but it IS needed by the two Gemini models in the default
          # MODELS_UNDER_TEST. Unset = those two fail, and the publish gate
          # (Verify run completeness) will block the scheduled commit. Warn
          # loudly so this is obvious before the gate trips.
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "::warning::GOOGLE_API_KEY is unset — Gemini 3.1 Pro and Gemini 3.5 Flash will fail. With the default model list, the publish-completeness gate will block the scheduled leaderboard commit. Add the secret, run a Gemini-free subset, or pass allow_partial=true."
          fi

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Pre-flight check
        run: python -m scripts.preflight

      - name: Run evaluation
        run: |
          DOMAINS="${{ github.event.inputs.domains || 'banking customer_success' }}"
          MODELS="${{ github.event.inputs.models }}"
          SCENARIO_LIMIT="${{ github.event.inputs.scenario_limit }}"
          JUDGES="${{ github.event.inputs.judges }}"
          RELIABILITY_RUNS="${{ github.event.inputs.reliability_runs }}"

          # All three judges run on hosted APIs (no GPU). For a cents-level
          # smoke run dispatch with: models=<one model>, scenario_limit=1,
          # judges=opus, reliability_runs=1, publish=false.
          ARGS="--domains $DOMAINS"
          if [ -n "$MODELS" ]; then
            ARGS="$ARGS --models $MODELS"
          fi
          if [ -n "$SCENARIO_LIMIT" ]; then
            ARGS="$ARGS --scenario-limit $SCENARIO_LIMIT"
          fi
          if [ -n "$JUDGES" ]; then
            ARGS="$ARGS --judges $JUDGES"
          fi
          if [ -n "$RELIABILITY_RUNS" ]; then
            ARGS="$ARGS --reliability-runs $RELIABILITY_RUNS"
          fi

          python -m scripts.run_eval $ARGS \
            --output data/results/results_$(date +%Y%m%d).parquet

      - name: Generate leaderboard
        run: python -m scripts.aggregate_results

      - name: Upload results artifact
        uses: actions/upload-artifact@v7
        with:
          name: eval-results-${{ github.run_number }}
          path: |
            data/results/*.parquet
            data/results/*.csv
            data/results/leaderboard.json
            data/results/run_manifest.json
            data/results/artifacts/
            data/results/traces/

      - name: Verify run completeness
        # Only matters when we're about to publish. Blocks a scheduled (or
        # explicit publish=true) commit when run_manifest.json shows any model
        # failed — that's the silent partial-leaderboard bug this gate exists
        # to stop. Pass --allow-partial for a deliberate partial publish.
        if: github.event_name == 'schedule' || github.event.inputs.publish == 'true'
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.allow_partial }}" = "true" ]; then
            ARGS="--allow-partial"
          fi
          python -m scripts.check_publish_ready $ARGS

      - name: Commit updated results
        # The scheduled run always publishes. A manual dispatch only publishes
        # when explicitly asked (publish=true) — so a subset smoke run can
        # validate the pipeline + upload its artifact without pushing a
        # misleading partial leaderboard to the live site.
        if: github.event_name == 'schedule' || github.event.inputs.publish == 'true'
        run: |
          # Upstream steps now fail loud on empty results; this assert is
          # belt-and-braces so a future regression diagnoses itself.
          test -f data/results/leaderboard.json || { echo "::error::leaderboard.json was not generated despite eval+aggregate exiting 0 — investigate scripts/aggregate_results.py"; exit 1; }
          git config user.name "COT Bench Bot"
          git config user.email "bot@cot-bench.dev"
          git add data/results/leaderboard.json data/results/latest.csv
          git diff --staged --quiet || git commit -m "Update leaderboard results $(date +%Y-%m-%d)"
          git push
