name: Deploy Leaderboard to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - 'data/results/leaderboard.json'

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp frontend/index.html _site/
          # Copy results data if it exists
          if [ -f data/results/leaderboard.json ]; then
            mkdir -p _site/data/results
            cp data/results/leaderboard.json _site/data/results/
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
