name: Generate Scenarios

# Dispatchable synthetic-scenario generation using repo secrets, so authors
# (claude-opus/kimi/glm, all via OpenRouter) can run without local credentials.
# Output lands on a branch as a DRAFT PR — generated scenarios always get human
# review before merging (multi-author diversification per docs/methodology.md
# authorship rules).

on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to generate for'
        required: true
        type: choice
        options: [banking, customer_success]
      author:
        description: 'Author model (must NOT be a model under test — enforced by the contamination guard)'
        required: true
        type: choice
        options: [claude-opus, kimi, glm]
      scenarios_per_category:
        description: 'Scenarios per category (5 categories; e.g. 2 => ~10 raw scenarios)'
        required: false
        default: '2'
      temperature:
        description: 'Author sampling temperature'
        required: false
        default: '1.0'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Check required secrets
        run: |
          # All current authors (claude-opus/kimi/glm) are served via OpenRouter.
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY repo secret is required for the ${{ github.event.inputs.author }} author."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Generate scenarios
        run: |
          python -m scripts.generate_data \
            --domain "${{ github.event.inputs.domain }}" \
            --author-model "${{ github.event.inputs.author }}" \
            --scenarios-per-category "${{ github.event.inputs.scenarios_per_category }}" \
            --temperature "${{ github.event.inputs.temperature }}"

      - name: Validate generated scenarios
        # Structural gate only. Generation failures already skip bad scenarios;
        # anything invalid here means a real schema problem worth surfacing.
        run: python -m scripts.validate_scenarios

      - name: Open draft PR with generated scenarios
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="gen/${{ github.event.inputs.domain }}-${{ github.event.inputs.author }}-${{ github.run_number }}"
          git config user.name "COT Bench Bot"
          git config user.email "bot@cot-bench.dev"
          git checkout -b "$BRANCH"
          git add data/scenarios/ data/domains/
          if git diff --staged --quiet; then
            echo "::warning::No new scenarios were generated (all attempts failed validation?). Nothing to PR."
            exit 0
          fi
          git commit -m "gen: ${{ github.event.inputs.author }}-authored scenarios for ${{ github.event.inputs.domain }} (run ${{ github.run_number }})"
          git push -u origin "$BRANCH"
          gh pr create --draft \
            --title "gen: ${{ github.event.inputs.author }}-authored scenarios for ${{ github.event.inputs.domain }}" \
            --body "Auto-generated by the Generate Scenarios workflow (run ${{ github.run_number }}). Author: \`${{ github.event.inputs.author }}\`, domain: \`${{ github.event.inputs.domain }}\`, ${{ github.event.inputs.scenarios_per_category }}/category at temperature ${{ github.event.inputs.temperature }}.

          Generated scenarios REQUIRE human review before merge (quality + dedup vs the hand-authored corpus). Run \`python -m scripts.validate_scenarios --strict-distribution\` locally after any culls."
