name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check eval/ scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check eval/ scripts/ tests/

  # Matrix aggregator — single check for branch protection to require.
  # Resilient to matrix changes: add/remove a Python version without touching
  # branch protection rules. If any matrix leg fails or is skipped, this fails.
  test-summary:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    steps:
      - name: Verify all test matrix jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::test matrix did not succeed (result: ${{ needs.test.result }})"
            exit 1
          fi
          echo "All test matrix jobs passed."
