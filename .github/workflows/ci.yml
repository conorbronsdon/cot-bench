name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check eval/ scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check eval/ scripts/ tests/

  # Secret scan — backstop for committed credentials (this repo has no GitHub
  # Advanced Security, so native push protection is unavailable). Runs gitleaks
  # over the full history on push and over the PR range on pull_request.
  # Config + allowlist live in .gitleaks.toml. Added after the 2026-06 incident.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # Matrix aggregator — single check for branch protection to require.
  # Resilient to matrix changes: add/remove a Python version without touching
  # branch protection rules. If any matrix leg fails or is skipped, this fails.
  test-summary:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() }}
    steps:
      - name: Verify all test matrix jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::test matrix did not succeed (result: ${{ needs.test.result }})"
            exit 1
          fi
          echo "All test matrix jobs passed."
